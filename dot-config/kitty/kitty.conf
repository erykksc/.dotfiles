# vim:fileencoding=utf-8:foldmethod=marker

# MacOS specific
macos_option_as_alt yes
macos_quit_when_last_window_closed yes
macos_traditional_fullscreen yes
macos_colorspace displayp3

# Options
scrollback_lines 100000
copy_on_select yes
scrollback_pager bash -c "ansi2txt | awk 'NF {p=1} p' | tac | awk 'NF {p=1} p' | tac | nvim --clean -c 'set clipboard=unnamedplus' -c 'setlocal buftype=nofile bufhidden=wipe nobuflisted noswapfile' -c 'setlocal nomodifiable' -c 'normal! G' -c 'set termguicolors' -c 'set relativenumber'"
allow_remote_control yes
listen_on unix:/tmp/mykitty
enabled_layouts splits, stack, tall, fat


# Aliases
action_alias launch_tab launch --type=tab --cwd=current

# Keyboard shortcuts
map kitty_mod+0 change_font_size all 0
map kitty_mod+t new_tab_with_cwd
map kitty_mod+n new_os_window_with_cwd
map ctrl+space>l goto_session -1
map ctrl+space>% launch --location=vsplit --cwd=current
map ctrl+space>" launch --location=hsplit --cwd=current
map ctrl+space>c new_tab_with_cwd
map ctrl+space>, set_tab_title
map ctrl+space>z toggle_layout stack
map ctrl+space>! detach_window new-tab
map ctrl+space>d detach_tab ask

map ctrl+space>space next_layout

map kitty_mod+u scroll_page_up
map kitty_mod+d scroll_page_down


## Navigation
map alt+h neighboring_window left
map alt+l neighboring_window right
map alt+j neighboring_window down
map alt+k neighboring_window up

# Let smart-splits.nvim handle the same keys when the focused kitty window runs Neovim.
map --when-focus-on var:IS_NVIM alt+h
map --when-focus-on var:IS_NVIM alt+l
map --when-focus-on var:IS_NVIM alt+j
map --when-focus-on var:IS_NVIM alt+k

map alt+shift+h move_window left
map alt+shift+l move_window right
map alt+shift+j move_window down
map alt+shift+k move_window up

map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9

map ctrl+page_up previous_tab
map ctrl+page_down next_tab
map ctrl+shift+page_up move_tab_backward
map ctrl+shift+page_down move_tab_forward

## Sessions
# map ctrl+alt+s save_as_session --use-foreground-process --relocatable --base-dir $HOME/.dotfiles/dot-config/kitty/sessions
map f7>s save_as_session --use-foreground-process --relocatable

## Launchers
map kitty_mod+. launch --type=tab --tab-title=dotfiles --cwd=$HOME/.dotfiles nvim .

# map ctrl+space>v launch --type=tab --cwd=current zsh -ic 'nvim $(fzf)'
# map alt+g launch --type=tab --cwd=current --tab-title=lazygit zsh -ic 'lazygit'
# map alt+g launch --type=background $HOME/.dotfiles/dot-config/kitty/scripts/kitty-focus-or-launch-tab lazygit zsh -ic lazygit
map alt+g launch --type=background --allow-remote-control --cwd=current $HOME/.dotfiles/dot-config/kitty/scripts/kitty-focus-or-launch-tab lazygit zsh -ic lazygit
# font_family family="JetBrainsMono Nerd Font Mono"
font_size 14
disable_ligatures always
cursor_blink_interval 0
hide_window_decorations yes
confirm_os_window_close 0

shell_integration no-cursor
cursor_shape block
cursor_blink_interval 0
cursor_trail 3
cursor_trail_decay 0.1 0.3
cursor_trail_start_threshold 3

tab_bar_style separator
tab_title_max_length 15
tab_bar_edge top


# BEGIN_KITTY_THEME
# Bluloco Light
include current-theme.conf
# END_KITTY_THEME

# BEGIN_KITTY_FONTS
font_family      family='AdwaitaMono Nerd Font' features=+zero
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
